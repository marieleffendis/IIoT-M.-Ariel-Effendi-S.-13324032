<!DOCTYPE html>
<html>
<head>
    <title>IIoT Tantangan 2</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/paho-mqtt/1.0.1/mqttws31.min.js"></script>
    <script src="script.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding-top: 50px; }
        .data-box { font-size: 48px; font-weight: bold; color: #2c3e50; }
        button { padding: 15px 30px; font-size: 18px; cursor: pointer; margin: 10px; }
        .on { background-color: #2ecc71; color: white; border: none; }
        .off { background-color: #e74c3c; color: white; border: none; }
    </style>
</head>
<body>
    <h1>Monitoring & Control ESP32</h1>
    
    <div>
        <p>Nilai Counter dari ESP32:</p>
        <div id="counterDisp" class="data-box">0</div>
    </div>

    <hr style="width: 50%; margin: 30px auto;">

    <div>
        <p>Kontrol LED ESP32:</p>
        <button class="on" onclick="sendControl('1')">NYALAKAN LED</button>
        <button class="off" onclick="sendControl('0')">MATIKAN LED</button>
    </div>
</body>
</html>
